name: Check Path Lengths
description: Checks for paths exceeding the Windows limit and posts or updates a PR comment with the results.

inputs:
  artifact:
    required: true
    description: Local path to the artifact directory to check

runs:
  using: composite
  steps:
    - name: Check path lengths
      id: check
      shell: bash
      # We need to use a heredoc to safely capture multi-line output from
      # check-path-lengths.luau
      run: |
        {
          echo 'longPaths<<EOF'
          lute run check-path-lengths --artifact ${{ inputs.artifact }}
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Find existing PR comment
      uses: peter-evans/find-comment@v3
      id: find-comment
      with:
        issue-number: ${{ github.event.pull_request.number }}
        comment-author: github-actions[bot]
        body-includes: "<!-- path-length-check -->"

    - name: Post or update PR comment
      if: steps.check.outputs.longPaths != ''
      uses: peter-evans/create-or-update-comment@v5
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ github.event.pull_request.number }}
        edit-mode: replace
        body: |
          <!-- path-length-check -->
          ## :warning: Path Length Issues

          The following paths in the `${{ inputs.artifact }}` artifact exceed the **163** character limit:

          ```
          ${{ steps.check.outputs.longPaths }}
          ```

    - name: Delete resolved PR comment
      if: steps.check.outputs.longPaths == '' && steps.find-comment.outputs.comment-id != ''
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.deleteComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: ${{ steps.find-comment.outputs.comment-id }},
          });
