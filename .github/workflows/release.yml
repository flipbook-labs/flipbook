name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      force-version:
        description: "Open a publish PR that sets this exact version (e.g. 2.5.0)"
        default: ""
        required: false
  release:
    types: [published]

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'debug:release-pr'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Get model file name
        run: |
          name=$(jq -r .name default.project.json)
          echo "MODEL_FILE=$name.rbxm" >> $GITHUB_ENV

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Build
        run: lute run build --channel prod --output ${{ env.MODEL_FILE }}

      - uses: actions/upload-artifact@v4
        with:
          name: flipbook-rbxm
          path: ${{ env.MODEL_FILE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'main' }}

      - uses: actions/download-artifact@v4
        with:
          name: flipbook-rbxm

      - uses: flipbook-labs/changewrite@v0.3.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base: main
          branch: ${{ github.event_name == 'pull_request' && 'debug-publish-next-version' || 'publish-next-version' }}
          prepare-only: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'debug:release-pr') }}
          force-version: ${{ inputs.force-version || '' }}
          pr-title: ${{ github.event_name == 'pull_request' && '[DEBUG] Publish v{{version}}' || 'Publish v{{version}}' }}
          pr-body: |
            >[!IMPORTANT]
            > This PR prepares the next release by bumping the version and updating the changelog.
            >
            > **Merging this PR will:**
            >
            > 1. Create and push tag `{{tag}}`
            > 2. Create a GitHub release for that tag, attach `Flipbook.rbxm`, and publish it
            > 3. Trigger publishing to the Roblox Creator Store

            <details>
            <summary><b>GitHub Release preview</b></summary>

            # {{tag}}

            **github-actions** released this 0 seconds ago 🔒 Immutable 🏷️ {{tag}} 🔗 SHA

            {{notes}}
            </details>

            Next release will be available here:
            {{repo_url}}/releases/tag/{{tag}}

            🤖 This PR was generated by [this run]({{run_url}}).
          post-draft-hook: |
            "$CHANGEWRITE_BIN" attach --tag "$CHANGEWRITE_TAG" --files Flipbook.rbxm

  publish-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: production
    environment:
      name: roblox-creator-store
      url: https://create.roblox.com/store/asset/8517129161
    env:
      LOG_LEVEL: debug
    if: ${{ github.event.release }}
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.1.1

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish release to Creator Store
        run: lune run publish-plugin --channel prod --apiKey ${{ secrets.ROBLOX_API_KEY }}

  publish-nightly-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: nightly
    environment:
      name: roblox-creator-store-dev
      url: https://create.roblox.com/store/asset/88523969718241
    env:
      LOG_LEVEL: debug
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish beta build to Creator Store
        run: lune run publish-plugin --channel beta --apiKey ${{ secrets.ROBLOX_API_KEY }}
