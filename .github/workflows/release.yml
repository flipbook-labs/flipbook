name: Release

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event.release }}
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Get model file name
        run: |
          name=$(jq -r .name default.project.json)
          echo "MODEL_FILE=$name.rbxm" >> $GITHUB_ENV

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Build
        run: lute run build --channel prod --output ${{ env.MODEL_FILE }}

      - name: Upload Flipbook as Roblox storybook-runtime asset
        run: |
          output=$(lute run upload-storybook-runtime --api-key ${{ secrets.ROBLOX_API_KEY }})
          echo "$output"
          assetId=$(echo "$output" | grep -oP '(?<=ASSET_ID=)\S+' | tail -1)
          mv ${{ env.MODEL_FILE }} Flipbook-${{ github.ref_name }}-${assetId}.rbxm
          echo "RUNTIME_FILE=Flipbook-${{ github.ref_name }}-${assetId}.rbxm" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.RUNTIME_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: production
    environment:
      name: roblox-creator-store
      url: https://create.roblox.com/store/asset/8517129161
    env:
      LOG_LEVEL: debug
    if: ${{ github.event.release }}
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.1.1

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish release to Creator Store
        run: lune run publish-plugin --channel prod --apiKey ${{ secrets.ROBLOX_API_KEY }}

  publish-nightly-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: nightly
    environment:
      name: roblox-creator-store-dev
      url: https://create.roblox.com/store/asset/88523969718241
    env:
      LOG_LEVEL: debug
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish nightly build to Creator Store
        run: lune run publish-plugin --channel dev --apiKey ${{ secrets.ROBLOX_API_KEY }}
