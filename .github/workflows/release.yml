name: Release

on:
  pull_request:
  release:
    types: [published]
  push:
    branches:
      - main

jobs:
  prep-next-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      # It's expected that the final decision on the version bump will be made
      # by the developer merging the release PR, so this step just prepares the
      # next version number for when that happens
      - name: Bump to next minor version
        run: lute run bump-version minor

      - name: Build changelog for next release
        run: lute run changelog release

      - name: Create draft PR for next release
        uses: peter-evans/create-pull-request@v8
        env:
          NEXT_VERSION: ${{ steps.get-next-version.outputs.next-version }}
        with:
          base: main
          add-paths: |
            CHANGELOG.md
            loom.config.luau
            wally.toml
            workspace/flipbook-core/rotriever.toml
          branch: version-bump
          commit-message: "Prepare next version"
          title: "[AUTO-GENERATED] Publish ${{ env.NEXT_VERSION }}"
          draft: true
          body: |
            Only merge this PR when you are ready to publish the next release.

            Merging this PR will:

            1. Update the version number to ${{ env.NEXT_VERSION }} across config files
            2. Publish the draft [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ env.NEXT_VERSION }}) for ${{ env.NEXT_VERSION }}
            3. Combine all of the unreleased changelog entries into CHANGELOG.md
            4. Update the version numbers in `loom.config.luau`, `wally.toml`, and `rotriever.toml`

            This pull request was generated by [this run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          tag_name: ${{ steps.get-next-version.outputs.next-version }}
          name: ${{ steps.get-next-version.outputs.next-version }}
          # TODO: Fill out the body with the slice of the most recent changelog
          body: "Draft release for version ${{ steps.get-next-version.outputs.next-version }}"
          fail_on_unmatched_files: true
          files: |
            # TODO: Include the rbxm

  publish-github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event.release }}
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Get model file name
        run: |
          name=$(jq -r .name default.project.json)
          echo "MODEL_FILE=$name.rbxm" >> $GITHUB_ENV

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Build
        run: lute run build --channel prod --output ${{ env.MODEL_FILE }}

      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.MODEL_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: production
    environment:
      name: roblox-creator-store
      url: https://create.roblox.com/store/asset/8517129161
    env:
      LOG_LEVEL: debug
    if: github.event.release
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.1.1

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish release to Creator Store
        run: lune run publish-plugin --channel prod --apiKey ${{ secrets.ROBLOX_API_KEY }}

  publish-nightly-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: nightly
    environment:
      name: roblox-creator-store-dev
      url: https://create.roblox.com/store/asset/88523969718241
    env:
      LOG_LEVEL: debug
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish nightly build to Creator Store
        run: lune run publish-plugin --channel dev --apiKey ${{ secrets.ROBLOX_API_KEY }}

  publish-smoketest-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency: ${{ github.ref }}
    environment:
      name: roblox-creator-store-smoketest
    env:
      LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v4

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.1.1

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Publish release to Creator Store
        run: lune run publish-plugin --smoketest --channel prod --apiKey ${{ secrets.ROBLOX_API_KEY }}
