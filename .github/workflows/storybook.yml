name: Storybook Preview

on:
  push:
    branches:
      - main
  pull_request:

# One lane per PR (and a separate lane for main), so concurrent pushes don't
# race two deploys against the same place. Cancel superseded PR previews, but
# never interrupt the main start-place deploy mid-flight.
concurrency:
  group: storybook-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: storybook-preview
    env:
      PREVIEW_PLACE_NAME: "Flipbook Preview ${{ github.event.pull_request.number }}"

    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Deploy main storybook
        if: github.event_name == 'push'
        env:
          ROBLOX_STORYBOOK_PREVIEW_API_KEY: ${{ secrets.ROBLOX_STORYBOOK_PREVIEW_API_KEY }}
        # The `--with-build` flag will build a Flipbook rbxm off `main` and use
        # that as the runtime for our primary storybook preview experience. And
        # we intentionally _exclude_ this flag from the below PR-triggered
        # deploy so that when a PR makes a change to Flipbook's UI that we don't
        # _also_ use that as the underlying app. PRs would effectively pollute
        # their own app otherwise.
        run: lute run deploy-storybook --with-build

      - name: Deploy storybook
        if: github.event_name == 'pull_request'
        env:
          ROBLOX_STORYBOOK_PREVIEW_API_KEY: ${{ secrets.ROBLOX_STORYBOOK_PREVIEW_API_KEY }}
        run: lute run deploy-storybook --place-name "$PREVIEW_PLACE_NAME"

      - name: Comment preview link on PR
        if: github.event_name == 'pull_request'
        env:
          ROBLOX_STORYBOOK_PREVIEW_API_KEY: ${{ secrets.ROBLOX_STORYBOOK_PREVIEW_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          flipbook-cli comment --pr ${{ github.event.pull_request.number }} \
            --universe-id "$(grep -oP 'ROBLOX_STORYBOOK_UNIVERSE_ID\s*=\s*\K\d+' project.luau)" \
            --place-name "$PREVIEW_PLACE_NAME" \
            --github-repository flipbook-labs/flipbook
