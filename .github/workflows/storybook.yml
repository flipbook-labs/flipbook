name: Deploy Storybook Experience

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: storybook-preview

    steps:
      - uses: actions/checkout@v6

      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: v1.2.0

      - name: Install dependencies
        run: lute run install

      - name: Create .env
        run: cp .env.template .env

      - name: Deploy main storybook
        if: github.event_name == 'push'
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
        run: lute run deploy-storybook

      - name: Deploy storybook
        if: github.event_name == 'pull_request'
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
        run: lute run deploy-storybook --place-name "Flipbook Preview #${{ github.event.pull_request.number }}"
